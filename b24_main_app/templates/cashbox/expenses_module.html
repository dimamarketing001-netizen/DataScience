<div id="cashbox-expense-section" class="cashbox-section" style="display: none;">
    <button class="ui-btn ui-btn-light-border cashbox-back-button">← Назад к выбору</button>
    <div class="ui-card">
        <div class="ui-form-title"><div class="ui-form-title-text">Добавить расход</div></div>
        <form id="expense-form" class="ui-form">
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Дата</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textbox ui-ctl-w100"><input type="text" id="expense-date" class="ui-ctl-element" required></div></div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Сумма</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textbox ui-ctl-w100"><input type="number" id="expense-amount" class="ui-ctl-element" required></div></div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Категория</div></div>
                <div class="ui-form-content">
                    <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                        <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                        <select id="expense-category" class="ui-ctl-element" required>
                            <option value="">Выберите категорию...</option>
                            <option value="office">Офис и Операционные расходы</option>
                            <option value="employees">Сотрудники</option>
                            <option value="marketing">Маркетинг и Лиды</option>
                            <option value="clients">Расходы по Клиентам</option>
                            <option value="taxes">Налоги и Банк</option>
                            <option value="it">IT и Оборудование</option>
                            <option value="transfers">Внутренние переводы</option>
                            <option value="other">Прочее</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="employee-fields" class="dynamic-field" style="display: none;">
                <div class="ui-form-row">
                    <div class="ui-form-label"><div class="ui-ctl-label-text">Сотрудник</div></div>
                    <div class="ui-form-content"><div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100"><div class="ui-ctl-after ui-ctl-icon-angle"></div><select id="expense-employee" class="ui-ctl-element"></select></div></div>
                </div>
                <div class="ui-form-row">
                    <div class="ui-form-label"><div class="ui-ctl-label-text">Тип выплаты</div></div>
                    <div class="ui-form-content"><div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100"><div class="ui-ctl-after ui-ctl-icon-angle"></div><select id="expense-payment-type" class="ui-ctl-element"><option value="fix">Фикса/ЗП</option><option value="motivation">Мотивация/Премия</option></select></div></div>
                </div>
            </div>
            <div id="marketing-fields" class="dynamic-field" style="display: none;">
                <div class="ui-form-row">
                    <div class="ui-form-label"><div class="ui-ctl-label-text">Подрядчик</div></div>
                    <div class="ui-form-content"><div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100"><div class="ui-ctl-after ui-ctl-icon-angle"></div><select id="expense-contractor" class="ui-ctl-element"></select></div></div>
                </div>
                <div class="ui-form-row">
                    <div class="ui-form-label"><div class="ui-ctl-label-text">Количество лидов</div></div>
                    <div class="ui-form-content" style="display: flex; gap: 10px;">
                        <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                            <input type="number" id="expense-paid-leads" class="ui-ctl-element" placeholder="Платные лиды">
                        </div>
                        <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                            <input type="number" id="expense-free-leads" class="ui-ctl-element" placeholder="Бесплатные лиды">
                        </div>
                    </div>
                </div>
            </div>
            <div id="client-fields" class="dynamic-field" style="display: none;">
                <div class="ui-form-row">
                    <div class="ui-form-label"><div class="ui-ctl-label-text">Клиент</div></div>
                    <div class="ui-form-content client-search-wrapper">
                        <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                            <input type="text" id="expense-client-search" class="ui-ctl-element" placeholder="Начните вводить имя клиента для поиска...">
                        </div>
                        <div id="client-search-results" class="client-search-results"></div>
                        <input type="hidden" id="selected-client-id">
                    </div>
                </div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Комментарий</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textarea ui-ctl-w100"><textarea id="expense-comment" class="ui-ctl-element"></textarea></div></div>
            </div>
            <div class="ui-form-row ui-form-row-actions">
                <div class="ui-form-label"></div>
                <div class="ui-form-content"><button type="submit" class="ui-btn ui-btn-primary" data-action="save">Сохранить расход</button></div>
            </div>
        </form>
    </div>
    <div class="ui-card">
        <div class="ui-form-title" style="margin-top: 0;"><div class="ui-form-title-text">Фильтр и список расходов</div></div>
        <form id="expenses-filter-form" class="ui-form filter-form">
            <div class="ui-form-row">
                <div class="ui-form-content">
                    <div class="filter-grid">
                        <div class="ui-ctl ui-ctl-textbox ui-ctl-w100 ui-ctl-after-icon ui-ctl-icon-calendar">
                            <input type="text" id="filter-start-date" class="ui-ctl-element" placeholder="Дата от...">
                        </div>
                        <div class="ui-ctl ui-ctl-textbox ui-ctl-w100 ui-ctl-after-icon ui-ctl-icon-calendar">
                            <input type="text" id="filter-end-date" class="ui-ctl-element" placeholder="Дата до...">
                        </div>
                        <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                            <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                            <select id="filter-category" class="ui-ctl-element"></select>
                        </div>
                        <div id="filter-employee-wrapper" class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100 dynamic-filter-field" style="display: none;">
                            <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                            <select id="filter-employee" class="ui-ctl-element"></select>
                        </div>
                        <div id="filter-contractor-wrapper" class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100 dynamic-filter-field" style="display: none;">
                            <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                            <select id="filter-contractor" class="ui-ctl-element"></select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ui-form-row ui-form-row-bottom-buttons">
                <div class="ui-form-content">
                    <button type="submit" class="ui-btn ui-btn-primary">Применить фильтр</button>
                    <button type="button" id="reset-filter-btn" class="ui-btn ui-btn-light-border">Сбросить</button>
                </div>
            </div>
        </form>
        <div class="expenses-table-container">
            <table class="expenses-table">
                <thead>
                    <tr>
                        <th>ID</th><th>Дата</th><th>Сумма</th><th>Категория</th><th>Сотрудник</th><th>Подрядчик</th><th>Клиент</th><th>Комментарий</th><th>Платные лиды</th><th>Бесплатные лиды</th><th>Добавил</th><th>Действия</th>
                    </tr>
                </thead>
                <tbody id="expenses-table-body"></tbody>
            </table>
            <div class="pagination-controls">
                <button id="prev-page-btn" class="ui-btn ui-btn-light-border">Предыдущая</button>
                <span id="page-info">Страница 1</span>
                <button id="next-page-btn" class="ui-btn ui-btn-light-border">Следующая</button>
            </div>
        </div>
    </div>
</div>
