<div id="cashbox-income-section" class="cashbox-section" style="display: none;">
    <button class="ui-btn ui-btn-light-border cashbox-back-button">← Назад к выбору</button>
    <div class="ui-card">
        <div class="ui-form-title"><div class="ui-form-title-text">Добавить приход</div></div>
        <form id="income-form" class="ui-form">
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Дата</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textbox ui-ctl-w100"><input type="text" id="income-date" class="ui-ctl-element" required></div></div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Сумма</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textbox ui-ctl-w100"><input type="number" id="income-amount" class="ui-ctl-element" required></div></div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Клиент</div></div>
                <div class="ui-form-content client-search-wrapper">
                    <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                        <input type="text" id="income-client-search" class="ui-ctl-element" placeholder="Начните вводить имя клиента...">
                    </div>
                    <div id="income-client-search-results" class="client-search-results"></div>
                    <input type="hidden" id="income-selected-client-id">
                </div>
            </div>
            <div id="income-deal-wrapper" class="ui-form-row" style="display: none;">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Сделка</div></div>
                <div class="ui-form-content">
                    <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                        <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                        <select id="income-deal-select" class="ui-ctl-element"></select>
                    </div>
                </div>
            </div>
            <div id="income-file-wrapper" class="ui-form-row">
                <div class="ui-form-label">
                    <div class="ui-ctl-label-text">Файл <span style="color: red;">*</span></div>
                </div>
                <div class="ui-form-content">
                    <div id="income-drop-zone" class="income-drop-zone">
                        <input type="file" id="income-file-input" accept=".pdf,image/*" style="display:none;">
                        <div id="income-drop-zone-content" class="income-drop-zone-content">
                            <span class="income-drop-zone-icon" title="Прикрепить файл">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#6c7a89;">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                                </svg>
                            </span>
                            <span class="income-drop-zone-text">Перетащите файл сюда или <span class="income-drop-zone-link">нажмите для выбора</span></span>
                            <span class="income-drop-zone-hint">PDF или изображение (JPG, PNG, GIF)</span>
                        </div>
                        <div id="income-file-preview" class="income-file-preview" style="display:none;">
                            <span id="income-file-name" class="income-file-name"></span>
                            <span id="income-file-remove" class="income-file-remove" title="Удалить файл">✕</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Комментарий</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textarea ui-ctl-w100"><textarea id="income-comment" class="ui-ctl-element"></textarea></div></div>
            </div>
            <div class="ui-form-row ui-form-row-actions">
                <div class="ui-form-label"></div>
                <div class="ui-form-content"><button type="submit" class="ui-btn ui-btn-primary">Сохранить приход</button></div>
            </div>
        </form>
    </div>

    <!-- Фильтр и таблица в одном блоке — как в расходах -->
    <div class="ui-card">
        <div class="ui-form-title" style="margin-top: 0;"><div class="ui-form-title-text">Фильтр и список приходов</div></div>
        <form id="incomes-filter-form" class="ui-form filter-form">
            <div class="ui-form-row">
                <div class="ui-form-content">
                    <div class="filter-grid">
                        <div class="ui-ctl ui-ctl-textbox ui-ctl-w100 ui-ctl-after-icon ui-ctl-icon-calendar">
                            <input type="text" id="income-filter-start-date" class="ui-ctl-element" placeholder="Дата от...">
                        </div>
                        <div class="ui-ctl ui-ctl-textbox ui-ctl-w100 ui-ctl-after-icon ui-ctl-icon-calendar">
                            <input type="text" id="income-filter-end-date" class="ui-ctl-element" placeholder="Дата до...">
                        </div>
                        <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                            <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                            <select id="income-filter-status" class="ui-ctl-element">
                                <option value="">Все записи</option>
                                <option value="0">Неподтверждённые</option>
                                <option value="1">Подтверждённые</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ui-form-row ui-form-row-bottom-buttons">
                <div class="ui-form-content">
                    <button type="submit" class="ui-btn ui-btn-primary">Применить фильтр</button>
                    <button type="button" id="income-reset-filter-btn" class="ui-btn ui-btn-light-border">Сбросить</button>
                </div>
            </div>
        </form>
        <div class="expenses-table-container">
            <table class="expenses-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Сумма</th>
                        <th>Клиент</th>
                        <th>Сделка</th>
                        <th>Комментарий</th>
                        <th>Добавил</th>
                        <th>Документ</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="incomes-table-body"></tbody>
            </table>
        </div>
    </div>
</div>
