<!-- Секция "Приход" -->
<div id="cashbox-income-section" class="cashbox-section" style="display: none;">
    <button class="ui-btn ui-btn-light-border cashbox-back-button">← Назад к выбору</button>
    <div class="ui-card">
        <div class="ui-form-title"><div class="ui-form-title-text">Добавить приход</div></div>
        <form id="income-form" class="ui-form">
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Дата</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textbox ui-ctl-w100"><input type="text" id="income-date" class="ui-ctl-element" required></div></div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Сумма</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textbox ui-ctl-w100"><input type="number" id="income-amount" class="ui-ctl-element" required></div></div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Клиент</div></div>
                <div class="ui-form-content client-search-wrapper">
                    <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                        <input type="text" id="income-client-search" class="ui-ctl-element" placeholder="Начните вводить имя клиента...">
                    </div>
                    <div id="income-client-search-results" class="client-search-results"></div>
                    <input type="hidden" id="income-selected-client-id">
                </div>
            </div>
            <div id="income-deal-wrapper" class="ui-form-row" style="display: none;">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Сделка</div></div>
                <div class="ui-form-content">
                    <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                        <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                        <select id="income-deal-select" class="ui-ctl-element"></select>
                    </div>
                </div>
            </div>
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Комментарий</div></div>
                <div class="ui-form-content"><div class="ui-ctl ui-ctl-textarea ui-ctl-w100"><textarea id="income-comment" class="ui-ctl-element"></textarea></div></div>
            </div>
            <div class="ui-form-row ui-form-row-actions">
                <div class="ui-form-label"></div>
                <div class="ui-form-content"><button type="submit" class="ui-btn ui-btn-primary">Сохранить приход</button></div>
            </div>
        </form>
    </div>
    <div class="ui-card">
        <div class="ui-form-title" style="margin-top: 0;"><div class="ui-form-title-text">Список приходов</div></div>
        <div class="expenses-table-container">
            <table class="expenses-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Сумма</th>
                        <th>Клиент</th>
                        <th>Сделка</th>
                        <th>Комментарий</th>
                        <th>Добавил</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="incomes-table-body"></tbody>
            </table>
        </div>
    </div>
</div>
