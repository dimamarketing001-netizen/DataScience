<!-- Модальное окно редактирования прихода -->
<div id="edit-income-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="width: 500px;">
        <div class="ui-form-title">
            <div class="ui-form-title-text">Редактировать приход</div>
        </div>
        <form id="edit-income-form" class="ui-form">
            <input type="hidden" id="edit-income-id">

            <!-- Поле: Дата -->
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Дата</div></div>
                <div class="ui-form-content">
                    <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                        <input type="text" id="edit-income-date" class="ui-ctl-element" required>
                    </div>
                </div>
            </div>

            <!-- Поле: Сумма -->
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Сумма</div></div>
                <div class="ui-form-content">
                    <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                        <input type="number" id="edit-income-amount" class="ui-ctl-element" required>
                    </div>
                </div>
            </div>

            <!-- Поле: Клиент (поиск) -->
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Клиент</div></div>
                <div class="ui-form-content client-search-wrapper">
                    <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                        <input type="text" id="edit-income-client-search" class="ui-ctl-element"
                               placeholder="Начните вводить имя клиента...">
                    </div>
                    <div id="edit-income-client-search-results" class="client-search-results"></div>
                    <input type="hidden" id="edit-income-selected-client-id">
                </div>
            </div>

            <!-- Поле: Сделка (скрывается/показывается при выборе клиента) -->
            <div id="edit-income-deal-wrapper" class="ui-form-row" style="display: none;">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Сделка</div></div>
                <div class="ui-form-content">
                    <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                        <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                        <select id="edit-income-deal-select" class="ui-ctl-element"></select>
                    </div>
                </div>
            </div>

            <!-- Поле: Комментарий -->
            <div class="ui-form-row">
                <div class="ui-form-label"><div class="ui-ctl-label-text">Комментарий</div></div>
                <div class="ui-form-content">
                    <div class="ui-ctl ui-ctl-textarea ui-ctl-w100">
                        <textarea id="edit-income-comment" class="ui-ctl-element"></textarea>
                    </div>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="ui-form-row ui-form-row-actions">
                <div class="ui-form-label"></div>
                <div class="ui-form-content">
                    <button type="submit" class="ui-btn ui-btn-primary">Сохранить изменения</button>
                    <button type="button" id="cancel-edit-income-btn" class="ui-btn ui-btn-light-border">Отмена</button>
                </div>
            </div>
        </form>
    </div>
</div>
