<!-- Модальное окно просмотра файла -->
<div id="file-viewer-modal" class="modal-overlay" style="display: none;" onclick="(function(e){if(e.target.id==='file-viewer-modal'){document.getElementById('file-viewer-modal').style.display='none';document.getElementById('file-viewer-content').innerHTML=''}})(event)">
    <div class="modal-content file-viewer-modal-content">
        <div class="file-viewer-header">
            <span id="file-viewer-title" class="file-viewer-title">Документ</span>
            <button id="file-viewer-close" class="file-viewer-close" onclick="document.getElementById('file-viewer-modal').style.display='none';document.getElementById('file-viewer-content').innerHTML=''">✕</button>
        </div>
        <div id="file-viewer-content" class="file-viewer-content">
            <!-- Сюда вставляется img или iframe -->
        </div>
        <div class="file-viewer-footer">
            <a id="file-viewer-download" href="#" target="_blank" class="ui-btn ui-btn-light-border" style="font-size:13px;">
                ⬇️ Скачать
            </a>
        </div>
    </div>
</div>
