<!-- Универсальное модальное окно подтверждения -->
<div id="confirmation-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="ui-form-title"><div class="ui-form-title-text" id="confirmation-modal-title">Подтвердите действие</div></div>
        <div class="modal-text" id="confirmation-modal-text">Вы уверены?</div>
        <div class="modal-buttons">
            <button id="confirm-action-btn" class="ui-btn btn-fixed-width">Подтвердить</button>
            <button id="cancel-action-btn" class="ui-btn ui-btn-light-border btn-fixed-width">Отмена</button>
        </div>
    </div>
</div>
