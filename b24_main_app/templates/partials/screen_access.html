<!-- ЭКРАН: ДОСТУПЫ -->
<div id="access-screen" class="app-screen" data-tab="access">
    <button class="ui-btn ui-btn-light-border back-button">← Назад в меню</button>

    <div class="ui-card">
        <div class="ui-form-title" style="margin-top: 0;"><div class="ui-form-title-text">Добавить правило</div></div>
        <div class="ui-form-row">
            <div class="ui-form-label"><div class="ui-ctl-label-text">Тип правила</div></div>
            <div class="ui-form-content">
                <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                    <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                    <select id="access-type-select" class="ui-ctl-element">
                        <option value="employee">На сотрудника</option>
                        <option value="department">На отдел</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="access-employee-select-wrapper" class="ui-form-row">
            <div class="ui-form-label"><div class="ui-ctl-label-text">Сотрудник</div></div>
            <div class="ui-form-content">
                <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                    <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                    <select id="access-employee-select" class="ui-ctl-element"></select>
                </div>
            </div>
        </div>

        <div id="access-department-select-wrapper" class="ui-form-row" style="display: none;">
            <div class="ui-form-label"><div class="ui-ctl-label-text">Отдел</div></div>
            <div class="ui-form-content">
                <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                    <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                    <select id="access-department-select" class="ui-ctl-element"></select>
                </div>
            </div>
        </div>

        <div class="ui-form-row ui-form-row-actions">
            <div class="ui-form-label"></div>
            <div class="ui-form-content">
                <button id="add-access-rule-btn" class="ui-btn ui-btn-primary" data-action="save">Добавить правило</button>
            </div>
        </div>
    </div>

    <hr class="ui-hr">

    <div class="ui-card">
        <div class="ui-form-title" style="margin-top: 0;"><div class="ui-form-title-text">Сохраненные правила</div></div>
        <div id="access-rules-container">
            <table class="access-rules-table">
                <thead>
                    <tr>
                        <th>Отдел/Сотрудник</th>
                        <th>Правило</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="access-rules-table-body">
                    <!-- Сюда будут добавляться строки с правилами -->
                </tbody>
            </table>
        </div>
    </div>
</div>
