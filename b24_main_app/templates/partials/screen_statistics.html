<!-- ЭКРАН: СТАТИСТИКА -->
<div id="statistics-screen" class="app-screen" data-tab="statistics">
    <button class="ui-btn ui-btn-light-border back-button">← Назад в меню</button>

    <div class="ui-card">

        <!-- ===== ВКЛАДКИ ===== -->
        <div style="display:flex; gap:15px; margin-bottom:20px;">
            <button class="ui-btn ui-btn-primary stats-tab-btn" data-tab="general">
                Общая статистика
            </button>
            <button class="ui-btn ui-btn-light-border stats-tab-btn" data-tab="comparison">
                Сравнение
            </button>
            <button class="ui-btn ui-btn-light-border stats-tab-btn" data-tab="settings">
                Настройки
            </button>
        </div>

        <!-- ============================= -->
        <!-- ===== ОБЩАЯ СТАТИСТИКА ===== -->
        <!-- ============================= -->
        <div id="stats-tab-general" class="stats-tab-content">

            <form id="statistics-filter-form" class="ui-form filter-form">
                <div class="ui-form-row">
                    <div class="ui-form-content">
                        <div class="filter-grid">

                            <div class="ui-ctl ui-ctl-textbox ui-ctl-w100 ui-ctl-after-icon ui-ctl-icon-calendar">
                                <input type="text" id="stats-start-date" class="ui-ctl-element" placeholder="Дата от...">
                            </div>

                            <div class="ui-ctl ui-ctl-textbox ui-ctl-w100 ui-ctl-after-icon ui-ctl-icon-calendar">
                                <input type="text" id="stats-end-date" class="ui-ctl-element" placeholder="Дата до...">
                            </div>

                            <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                                <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                                <select id="stats-group-by" class="ui-ctl-element">
                                    <option value="source">По источникам</option>
                                    <option value="utm_campaign">По кампаниям</option>
                                    <option value="utm_content">По объявлениям</option>
                                </select>
                            </div>

                            <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                                <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                                <select id="stats-sales-department" class="ui-ctl-element">
                                    <option value="">Все отделы продаж</option>
                                </select>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="ui-form-row ui-form-row-bottom-buttons">
                    <div class="ui-form-content">
                        <button type="submit" class="ui-btn ui-btn-primary">
                            Применить
                        </button>
                    </div>
                </div>
            </form>

            <div class="expenses-table-container">
                <table class="expenses-table">
                    <thead>
                        <tr>
                            <th>Группа</th>
                            <th>Лиды</th>
                            <th>Успешные</th>
                        </tr>
                    </thead>
                    <tbody id="statistics-table-body"></tbody>
                </table>
            </div>

        </div>

        <!-- ===================== -->
        <!-- ===== СРАВНЕНИЕ ===== -->
        <!-- ===================== -->
        <div id="stats-tab-comparison" class="stats-tab-content" style="display:none;">

            <div class="ui-form-row">
                <div class="ui-form-content" style="display:flex; gap:15px; flex-wrap:wrap;">

                    <div class="ui-ctl ui-ctl-textbox ui-ctl-w100">
                        <input type="number" id="comparison-year" class="ui-ctl-element"
                               placeholder="Год" value="2025">
                    </div>

                    <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                        <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                        <select id="comparison-group-by" class="ui-ctl-element">
                            <option value="source">По источникам</option>
                            <option value="utm_campaign">По кампаниям</option>
                            <option value="utm_content">По объявлениям</option>
                        </select>
                    </div>
                    <div class="ui-ctl ui-ctl-after-icon ui-ctl-dropdown ui-ctl-w100">
                        <div class="ui-ctl-after ui-ctl-icon-angle"></div>
                        <select id="comparison-period-type" class="ui-ctl-element">
                            <option value="month">Месяцы</option>
                            <option value="week">Недели</option>
                        </select>
                    </div>

                    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">

                        <label>
                            <input type="checkbox" class="comparison-stage" value="answered" checked>
                            Дозвон
                        </label>

                        <label>
                            <input type="checkbox" class="comparison-stage" value="meeting_scheduled">
                            Назначена встреча
                        </label>

                        <label>
                            <input type="checkbox" class="comparison-stage" value="arrival">
                            Приход
                        </label>

                        <label>
                            <input type="checkbox" class="comparison-stage" value="success">
                            Успех
                        </label>

                    </div>

                    <button id="comparison-apply-btn" class="ui-btn ui-btn-primary">
                        Применить
                    </button>

                </div>
            </div>

            <div class="expenses-table-container">
                <table class="expenses-table">
                    <thead id="comparison-table-head"></thead>
                    <tbody id="comparison-table-body"></tbody>
                </table>
            </div>

        </div>

        <!-- ===================== -->
        <!-- ===== НАСТРОЙКИ ===== -->
        <!-- ===================== -->
        <div id="stats-tab-settings" class="stats-tab-content" style="display:none;">

            <div style="margin-bottom:30px;">
                <div class="ui-form-title-text">UTM Кампании</div>
                <div class="expenses-table-container">
                    <table class="expenses-table">
                        <thead>
                            <tr>
                                <th>UTM значение</th>
                                <th>Пользовательское название</th>
                                <th>Сохранить</th>
                            </tr>
                        </thead>
                        <tbody id="utm-campaign-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div>
                <div class="ui-form-title-text">UTM Объявления</div>
                <div class="expenses-table-container">
                    <table class="expenses-table">
                        <thead>
                            <tr>
                                <th>UTM значение</th>
                                <th>Пользовательское название</th>
                                <th>Сохранить</th>
                            </tr>
                        </thead>
                        <tbody id="utm-content-table-body"></tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>
</div>
