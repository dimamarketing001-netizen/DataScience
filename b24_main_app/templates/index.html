<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансы и Статистика</title>
    <script src="//api.bitrix24.com/api/v1/"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="static/custom_styles.css">
    <style>
        .main-menu { display: flex; justify-content: center; align-items: center; gap: 30px; padding: 40px 20px; }
        .menu-card { width: 250px; padding: 20px; border: 1px solid #eef2f4; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s ease-in-out; background-color: #fff; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); }
        .menu-card-icon { font-size: 48px; color: #2fc6f6; margin-bottom: 15px; }
        .menu-card-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .menu-card-description { font-size: 14px; color: #828b95; }
        .app-screen { display: none; }
        .app-screen.active { display: block; }
        .back-button { margin-bottom: 20px; }
        .dynamic-field { display: none; }
        /* Стили для модального окна */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 400px; text-align: center; }
        .modal-text { margin-bottom: 20px; text-align: left; }
        .modal-buttons { display: flex; justify-content: center; gap: 10px; }
        .btn-fixed-width { width: 100px; }
    </style>
</head>
<body>
    <div id="loader-overlay" class="loader-overlay" style="display: none;"><div class="loader"></div></div>

    <div class="workarea-content-paddings">
        <!-- ЭКРАНЫ ПРИЛОЖЕНИЯ (меню, касса, статистика) -->
        <!-- ... код экранов без изменений ... -->
        <div id="main-menu" class="app-screen active">
            <div class="ui-form-title"><div class="ui-form-title-text">Выберите раздел</div></div>
            <div class="main-menu">
                <div id="goto-cashbox" class="menu-card">
                    <div class="menu-card-icon">💰</div>
                    <div class="menu-card-title">Касса</div>
                    <div class="menu-card-description">Внесение и учет расходов, зарплат и прочих финансовых операций.</div>
                </div>
                <div id="goto-statistics" class="menu-card">
                    <div class="menu-card-icon">📊</div>
                    <div class="menu-card-title">Статистика</div>
                    <div class="menu-card-description">Анализ конверсии лидов по стадиям и источникам.</div>
                </div>
            </div>
        </div>
        <div id="cashbox-screen" class="app-screen">
            <button class="ui-btn ui-btn-light-border back-button">← Назад в меню</button>
            <div class="ui-form-title"><div class="ui-form-title-text">Добавить расход</div></div>
            <form id="expense-form" class="ui-form"><!-- ... форма без изменений ... --></form>
        </div>
        <div id="statistics-screen" class="app-screen">
            <button class="ui-btn ui-btn-light-border back-button">← Назад в меню</button>
            <div class="ui-form-title"><div class="ui-form-title-text">Статистика по лидам</div></div>
            <div class="filter-container"><!-- ... фильтры без изменений ... --></div>
            <div id="dashboard-container" class="dashboard-container"></div>
        </div>
    </div>

    <!-- Кастомное модальное окно -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div id="modal-text" class="modal-text"></div>
            <div class="modal-buttons">
                <button id="modal-confirm-btn" class="ui-btn ui-btn-primary btn-fixed-width">Да</button>
                <button id="modal-cancel-btn" class="ui-btn ui-btn-light-border btn-fixed-width">Нет</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <script src="static/statistics_app.js"></script>
</body>
</html>
